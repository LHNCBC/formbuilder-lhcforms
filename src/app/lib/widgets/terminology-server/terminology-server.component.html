<ng-container>
  <div [ngClass]="{'row': labelPosition === 'left', 'm-0': true}">
    @if (!nolabel) {
      <lfb-label
        [for]="id"
        [title]="schema.title"
        [helpMessage]="schema.description"
        [ngClass]="labelClasses"
      ></lfb-label>
    }
    <div class="{{controlClasses}} row">
      <p #hint [attr.id]="'hint_'+id" class="mb-1 ps-0"><small><em>{{formProperty.schema.widget?.note}}</em></small></p>
      <input [attr.readonly]="schema.readOnly ? true : null"
        class="form-control form-control-sm"
        type="url"
        (focus)="announceHint()"
        #urlInput
        [attr.id]="id" [(ngModel)]="valueUrl" (ngModelChange)="urlChanged()" [attr.placeholder]="schema.widget?.placeholder"
        >
      @if (!urlValid) {
        <small  class="ps-0 text-danger form-text" role="alert">Please enter a valid URL.</small>
      }
    </div>
  </div>
</ng-container>
