<lfb-form-element #extContainer [formProperty]="extensionsProperty"></lfb-form-element>
<div class="row m-0">
  <div class="{{extensionsProperty.schema.widget.labelClasses}}"></div>
  <div class="{{extensionsProperty.schema.widget.controlClasses}} d-flex align-items-center mt-2 p-0">
    <label class="ps-0 px-2 pe-2" for="extensionContainer_{{id}}">
      Hide extensions that are created or editable by other fields
    </label>
    <input type="checkbox" id="extensionContainer_{{id}}" (change)="onHideChange($event)" class="extension-container-checkbox"/>
  </div>
</div>
