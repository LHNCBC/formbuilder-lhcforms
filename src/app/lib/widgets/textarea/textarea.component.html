@if (schema.widget.id ==='hidden') {
  <input
    name="{{name}}" type="hidden" [formControl]="control">
} @else {
  <div [ngClass]="{'row': labelPosition === 'left', 'm-0': true}">
    @if (!nolabel) {
      <lfb-label
        [for]="id+_id"
        [title]="schema.title"
        [helpMessage]="schema.description"
        [ngClass]="labelClasses"
        class="form-label"
      ></lfb-label>
    }
    <div class="{{controlClasses}}">
      <textarea [name]="name" [readonly]="schema.readOnly"
             class="form-control form-control-sm"
             [attr.type]="schema.widget.id"
             [attr.id]="id+_id"  [formControl]="control" [attr.placeholder]="schema.placeholder"
             [attr.maxLength]="schema.maxLength || null"
             [attr.minLength]="schema.minLength || null"
             [attr.rows]="widgetInfo.rows || 2"
             [required]="isRequired" [lfbDisableControl]="schema.disabled"
      ></textarea>
      @for (error of errors; track error.code) {
        @if (formProperty.value && error) {
          <small
            class="text-danger form-text" role="alert"
          >{{error.modifiedMessage || error.originalMessage}}</small>
        }
      }
    </div>
  </div>
}
