@if(!widgetInfo.nolabel) {
  <lfb-label
             [title]="schema.title"
             [helpMessage]="schema.description"
             [ngClass]="widgetInfo.labelClasses"
  ></lfb-label>
}
<div class="lfb-object-body ms-4 shadow-sm rounded">
  @for (sf of showFields; track sf.field) {
    <div class="lfb-object-subfield my-2">
      <lfb-form-element [formProperty]="formProperty.getProperty(sf.field)"></lfb-form-element>
    </div>
  }
</div>
